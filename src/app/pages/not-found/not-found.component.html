<div class="relative min-h-screen overflow-hidden">
  <!-- Animated Gradient Background -->
  <div
    class="absolute inset-0 bg-gradient-to-br from-pennywise-primary/20 via-pennywise-secondary/20 to-pennywise-accent/20 bg-[length:400%_400%] animate-gradient-anim"
  ></div>
  <div class="absolute inset-0 overflow-hidden z-10">
    <div
      class="absolute top-10 left-1/4 w-40 sm:w-60 h-40 sm:h-60 bg-pennywise-primary/10 rounded-full blur-2xl animate-float-slow"
    ></div>
    <div
      class="absolute top-1/2 left-3/4 w-48 sm:w-72 h-48 sm:h-72 bg-pennywise-secondary/10 rounded-full blur-2xl animate-orbit-slow"
    ></div>
    <div
      class="absolute top-3/4 left-1/3 w-32 sm:w-48 h-32 sm:h-48 bg-pennywise-accent/10 rounded-full blur-2xl animate-float-slow delay-3000"
    ></div>
  </div>
  <div
    class="relative z-10 flex flex-col items-center justify-center min-h-screen px-4 py-10"
  >
    <div
      class="w-full max-w-md bg-white/90 backdrop-blur-xl rounded-2xl shadow-xl border border-pennywise-accent/20 p-8 flex flex-col items-center"
    >
      <h1
        class="text-6xl font-extrabold bg-gradient-to-r from-pennywise-primary to-pennywise-secondary bg-clip-text text-transparent mb-4"
      >
        404
      </h1>
      <h2 class="text-2xl font-bold text-gray-700 mb-2">Page Not Found</h2>
      <p class="text-gray-500 mb-6 text-center">
        Sorry, the page you are looking for does not exist.
      </p>
      <a
        href="/home"
        class="bg-pennywise-primary hover:bg-pennywise-secondary text-white px-6 py-2 rounded-xl font-bold shadow hover:shadow-lg transition"
        >Go to Home</a
      >
    </div>
  </div>
</div>
